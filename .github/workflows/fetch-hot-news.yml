name: 🔥 定时抓取热点

on:
  schedule:
    # 每30分钟运行一次
    - cron: '*/30 * * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 执行抓取脚本
        run: node scripts/fetch-hot-news.js

      - name: 提交更新后的数据
        run: |
          git config user.name "hot-news-bot"
          git config user.email "bot@hot-news.app"
          git add data/
          # 只有数据有变化时才提交
          git diff --staged --quiet || git commit -m "🤖 自动更新热点数据 $(date '+%Y-%m-%d %H:%M')"
          git push
